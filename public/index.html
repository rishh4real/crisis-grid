<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ENV must load before any module -->
  <script src="env-config.js"></script>
  <script src="theme.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CrisisGrid — Real-time humanitarian crisis map. Ground truth, delivered to those who act." />
  <title>CrisisGrid — Live Crisis Map</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />

  <style>
    /* ── Dashboard layout ─────────────────────────────────────────── */
    body { overflow: hidden; display: flex; flex-direction: column; height: 100dvh; }

    .dashboard {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ── Map ──────────────────────────────────────────────────────── */
    #map {
      flex: 1;
      height: 100%;
      position: relative;
      z-index: 1;
    }

    /* ── Map overlay controls ─────────────────────────────────────── */
    .map-controls {
      position: absolute;
      top: 16px; left: 16px;
      z-index: 500;
      display: flex; flex-direction: column; gap: 8px;
    }

    .filter-strip {
      display: flex; gap: 6px; flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 12px; font-weight: 600;
      border: 1px solid var(--border-bright);
      background: rgba(8,12,20,0.85);
      backdrop-filter: blur(10px);
      color: var(--text-label);
      cursor: pointer;
      transition: var(--transition);
      display: flex; align-items: center; gap: 5px;
    }
    .filter-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }
    .filter-btn.active { color: #fff; background: var(--accent); border-color: var(--accent); }
    .filter-btn .dot {
      width: 8px; height: 8px; border-radius: 50%;
    }

    .recenter-btn {
      width: 34px; height: 34px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-bright);
      background: rgba(8,12,20,0.85);
      backdrop-filter: blur(10px);
      color: var(--text-label);
      cursor: pointer; font-size: 15px;
      transition: var(--transition);
      display: flex; align-items: center; justify-content: center;
    }
    .recenter-btn:hover { color: var(--text-primary); }

    /* ── Sidebar ──────────────────────────────────────────────────── */
    #sidebar {
      width: 320px;
      flex-shrink: 0;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 10;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    .sidebar-header {
      padding: 20px 20px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-title {
      font-size: 13px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-muted); margin-bottom: 14px;
    }

    /* Stats row */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; margin-bottom: 4px;
    }
    .stat-chip {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 8px;
      text-align: center;
    }
    .stat-chip-val {
      font-size: 22px; font-weight: 800;
      display: block; line-height: 1;
    }
    .stat-chip-label {
      font-size: 10px; font-weight: 500;
      color: var(--text-muted); margin-top: 4px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .stat-chip.high .stat-chip-val { color: var(--red); }
    .stat-chip.med  .stat-chip-val { color: var(--orange); }
    .stat-chip.low  .stat-chip-val { color: var(--green); }

    /* Hotspot list */
    .sidebar-section-title {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--text-muted); padding: 16px 20px 8px;
      flex-shrink: 0;
    }

    #hotspot-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px;
    }

    .hotspot-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: var(--transition);
    }
    .hotspot-item:hover {
      border-color: var(--border-bright);
      background: rgba(255,255,255,0.04);
      transform: translateX(-2px);
    }
    .hotspot-item:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .hotspot-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px;
    }
    .hotspot-rank { font-size: 18px; flex-shrink: 0; }
    .hotspot-title {
      flex: 1;
      font-size: 13px; font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .hotspot-meta {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .hotspot-stat { display: flex; flex-direction: column; gap: 2px; }
    .hotspot-stat-label {
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .hotspot-stat-value { font-size: 13px; font-weight: 600; color: var(--text-primary); }

    /* Sidebar footer */
    .sidebar-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text-muted);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }

    /* Sidebar toggle (mobile) */
    #sidebar-toggle {
      display: none;
      position: absolute;
      bottom: 80px; right: 16px;
      z-index: 600;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(59,130,246,0.4);
    }

    /* ── Navbar count pill ────────────────────────────────────────── */
    .count-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border-bright);
      border-radius: 99px;
      padding: 4px 12px;
      font-size: 12px; font-weight: 600;
      color: var(--text-label);
    }
    .count-pill span { color: var(--text-primary); }

    /* ── Responsive ───────────────────────────────────────────────── */
    @media (max-width: 768px) {
      #sidebar {
        position: absolute;
        top: 0; right: 0; bottom: 0;
        width: min(300px, 88vw);
        transform: translateX(100%);
        z-index: 200;
      }
      #sidebar.sidebar-open { transform: translateX(0); }
      #sidebar-toggle { display: flex; align-items: center; justify-content: center; }
      .map-controls { top: 12px; left: 12px; }
    }
  </style>
</head>
<body>
  <!-- Emergency Header -->
  <div class="emergency-banner">
    EMERGENCY RESPONSE SYSTEM — For authorized field workers and NGO coordinators only
  </div>

  <!-- Navbar -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="navbar-brand">
      <a href="landing.html" style="display:flex; align-items:center; gap:14px; text-decoration:none;">
        <div class="navbar-logo" aria-hidden="true">
        <svg width="40" height="40" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect width="100" height="100" rx="16" fill="#1b2a4a"/>
          <line x1="20" y1="0" x2="20" y2="100" stroke="#2c3e50" stroke-width="1"/>
          <line x1="40" y1="0" x2="40" y2="100" stroke="#2c3e50" stroke-width="1"/>
          <line x1="60" y1="0" x2="60" y2="100" stroke="#2c3e50" stroke-width="1"/>
          <line x1="80" y1="0" x2="80" y2="100" stroke="#2c3e50" stroke-width="1"/>
          <line x1="0" y1="25" x2="100" y2="25" stroke="#2c3e50" stroke-width="1"/>
          <line x1="0" y1="50" x2="100" y2="50" stroke="#2c3e50" stroke-width="1"/>
          <line x1="0" y1="75" x2="100" y2="75" stroke="#2c3e50" stroke-width="1"/>
          <circle cx="20" cy="30" r="8" fill="#ef4444"/>
          <line x1="20" y1="38" x2="20" y2="52" stroke="#ef4444" stroke-width="2.5"/>
          <circle cx="60" cy="55" r="6" fill="#f97316"/>
          <line x1="60" y1="61" x2="60" y2="72" stroke="#f97316" stroke-width="2"/>
          <circle cx="80" cy="22" r="5" fill="#22c55e"/>
          <line x1="80" y1="27" x2="80" y2="36" stroke="#22c55e" stroke-width="2"/>
          <circle cx="20" cy="30" r="14" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
          <path d="M20 52 Q40 58 60 72" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,3" fill="none" opacity="0.5"/>
        </svg>
      </div>
      <div>
        <div class="navbar-name">CrisisGrid</div>
        <div class="navbar-slogan">EMERGENCY COMMAND CENTER</div>
      </div>
      </a>
    </div>

    <div class="navbar-actions">
      <div class="count-pill">
        <span id="report-count">0</span> active reports
      </div>
      <div class="live-badge" aria-live="polite">
        <div class="live-dot"></div> LIVE
      </div>
      <a href="submit.html" class="nav-link nav-link-primary" aria-label="Submit a field report">
        + Submit Report
      </a>
    </div>
  </nav>

  <!-- Dashboard -->
  <main class="dashboard" role="main">

    <!-- Map -->
    <div id="map" aria-label="Crisis map">
      <!-- Map controls -->
      <div class="map-controls" role="group" aria-label="Map filters">
        <div class="filter-strip">
          <button class="filter-btn active" data-filter="all" aria-pressed="true">All</button>
          <button class="filter-btn" data-filter="high" aria-pressed="false">
            <span class="dot" style="background:var(--red)"></span> Critical
          </button>
          <button class="filter-btn" data-filter="medium" aria-pressed="false">
            <span class="dot" style="background:var(--orange)"></span> Moderate
          </button>
          <button class="filter-btn" data-filter="low" aria-pressed="false">
            <span class="dot" style="background:var(--green)"></span> Low
          </button>
        </div>
        <button class="recenter-btn" id="recenter-btn" aria-label="Recenter map to India">🎯</button>
      </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" aria-label="Hotspot panel">
      <div class="sidebar-header">
        <div class="sidebar-title">Response Overview</div>
        <div class="stats-row" role="list" aria-label="Report statistics">
          <div class="stat-chip high" role="listitem">
            <span class="stat-chip-val" id="stats-high">0</span>
            <div class="stat-chip-label">Critical</div>
          </div>
          <div class="stat-chip med" role="listitem">
            <span class="stat-chip-val" id="stats-med">0</span>
            <div class="stat-chip-label">Moderate</div>
          </div>
          <div class="stat-chip low" role="listitem">
            <span class="stat-chip-val" id="stats-low">0</span>
            <div class="stat-chip-label">Low Risk</div>
          </div>
        </div>
      </div>

      <div class="sidebar-section-title" aria-label="Top 3 hotspots">🔥 Top Hotspots</div>

      <div id="hotspot-list" role="list" aria-label="Crisis hotspot list">
        <!-- Populated by app.js -->
        <div style="text-align:center;padding:40px 0;color:var(--text-muted);">
          <div style="font-size:32px;margin-bottom:10px;animation:spin 2s linear infinite">⏳</div>
          <div style="font-size:13px;">Connecting to live feed…</div>
        </div>
      </div>

      <div class="sidebar-footer">
        <span>Updated: <strong id="last-updated">—</strong></span>
        <div style="display:flex; gap:12px; align-items:center;">
          <button id="theme-toggle" class="btn" style="padding: 4px 8px; font-size: 11px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); cursor:pointer;">🌙 Dark Mode</button>
          <a href="submit.html" style="font-size:11px;color:var(--accent)">+ Add Report</a>
        </div>
      </div>
    </aside>
  </main>

  <!-- Sidebar toggle (mobile) -->
  <button id="sidebar-toggle" aria-label="Toggle hotspot sidebar" aria-expanded="false">☰</button>

  <!-- Toast container -->
  <div id="toast-container" role="status" aria-live="polite"></div>

  <!-- Firebase SDK (compat mode — works without build step) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- App logic -->
  <script src="app.js"></script>
</body>
</html>
